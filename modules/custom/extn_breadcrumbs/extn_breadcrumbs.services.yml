      - { name: breadcrumb_builder}

  extn_breadcrumbs.checkout_breadcrumb:
    class: Drupal\extn_breadcrumbs\Breadcrumb\CheckoutBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder}

  extn_breadcrumbs.blog_list_breadcrumb:
    class: Drupal\extn_breadcrumbs\Breadcrumb\BlogListBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder}

  extn_breadcrumbs.node_page_breadcrumb:
