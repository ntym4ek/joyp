      - { name: breadcrumb_builder}

  extn_breadcrumbs.researches_list_breadcrumb:
    class: Drupal\extn_breadcrumbs\Breadcrumb\ResearchesListBreadcrumbBuilder
    tags:
      - { name: breadcrumb_builder}

