services:
  _defaults:
    autowire: true
  extn_commerce.guest_checkout_completion_subscriber:
    class: Drupal\extn_commerce\EventSubscriber\GuestCheckoutCompletionSubscriber
    tags:
      - { name: event_subscriber }

  extn_commerce.route_subscriber:
    class: Drupal\extn_commerce\Routing\RouteSubscriber
    tags:
      - { name: event_subscriber }

  extn_commerce.checkout_complete_access:
    class: Drupal\extn_commerce\Access\CheckoutCompleteAccessCheck
    tags:
      - { name: access_check, applies_to: _checkout_complete_access_check }
