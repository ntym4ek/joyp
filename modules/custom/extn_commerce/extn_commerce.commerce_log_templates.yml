cart_entity_added:
  category: commerce_cart
  label: 'Добавление в корзину'
  template: '<p>Товар <em>{{ purchased_entity_label }}</em> добавлен в корзину.</p>'
cart_item_removed:
  category: commerce_cart
  label: 'Удаление из корзины'
  template: '<p>Товар <em>{{ purchased_entity_label }}</em> удалён из корзины.</p>'

checkout_complete:
  category: commerce_checkout
  label: 'Оформление заказа'
  template: '<p>Покупатель завершил оформление заказа.</p>'

order_created_admin:
  category: commerce_order
  label: 'Создание заказа'
  template: '<p>Заказ создан через административный интерфейс.</p>'
# Deprecated in favor of the generic order_state_updated log template.
order_placed:
  category: commerce_order
  label: 'Order placed'
  template: '<p>The order was placed.</p>'
# Deprecated in favor of the generic order_state_updated log template.
order_validated:
  category: commerce_order
  label: 'Order validated'
  template: '<p>The order was validated.</p>'
# Deprecated in favor of the generic order_state_updated log template.
order_fulfilled:
  category: commerce_order
  label: 'Order fulfilled'
  template: '<p>The order was fulfilled.</p>'
# Deprecated in favor of the generic order_state_updated log template.
order_canceled:
  category: commerce_order
  label: 'Order canceled'
  template: '<p>The order was canceled.</p>'
order_assigned:
  category: commerce_order
  label: 'Order assigned'
  template: '<p>Заказ привязан к пользователю {{ user }}.</p>'
order_mail:
  category: commerce_order
  label: 'Order email'
  template: '<p>Email "{{ id }}" отправлен {{ to_email }}.</p>'
order_mail_failure:
  category: commerce_order
  label: 'Order email'
  template: '<p>Email "{{ id }}" НЕ отправлен {{ to_email }}.</p>'
order_state_updated:
  category: commerce_order
  label: 'Order state updated'
  template: '<p>Статус заказа изменён с <em>{{ from_state }}</em> на <em>{{ to_state }}</em> действием <em>{{ transition_label }}</em>.</p>'
mail_order_receipt:
  category: commerce_order
  label: 'Order receipt email'
  template: '<p>Письмо об оформленном заказе отправлено на {{ to_email }}.</p>'
mail_order_receipt_failure:
  category: commerce_order
  label: 'Order receipt email failure'
  template: '<p>Order receipt email failed to send to {{ to_email }}.</p>'
commerce_order_admin_comment:
  category: commerce_order
  label: 'Admin comment'
  template: '<p><strong>Admin comment:</strong><br /> {{ comment }}</p>'
commerce_order_from_customer_comment:
  category: commerce_order
  label: 'Comment from customer'
  template: '<p><strong>From customer:</strong><br /> {{ comment|raw }}</p>'
payment_added:
  category: commerce_payment
  label: 'Payment added'
  template: '<p>Пользователь перешёл к процессу оплаты заказа на сумму {{ amount|commerce_price_format }} через <em>{{ gateway }}</em>{% if method %} using <em>{{ method }}</em>{% endif %}. Статус: {{ state }}.{% if remote_id %}<br /> Transaction ID: {{ remote_id }}.{% endif %}</p>'
payment_authorized:
  category: commerce_payment
  label: 'Payment authorized'
  template: '<p>Payment authorized via <em>{{ gateway }}</em> for {{ amount|commerce_price_format }}{% if method %} using <em>{{ method }}</em>{% endif %}.{% if remote_id %}<br /> Transaction ID: {{ remote_id }}.{% endif %}</p>'
payment_manual_received:
  category: commerce_payment
  label: 'Manual payment received'
  template: '<p>Payment received via <em>{{ gateway }}</em> for {{ amount|commerce_price_format }}.</p>'
payment_completed:
  category: commerce_payment
  label: 'Payment captured'
  template: '<p>Успешная оплата через <em>{{ gateway }}</em> на сумму {{ amount|commerce_price_format }}{% if method %} using <em>{{ method }}</em>{% endif %}.{% if remote_id %}<br /> Transaction ID: {{ remote_id }}.{% endif %}</p>'
payment_updated:
  category: commerce_payment
  label: 'Payment updated'
  template: '<p>Информация о платеже обновлена. Баланс: {{ amount|commerce_price_format }}. Статус: {{ state }}.{% if remote_id %}<br /> Transaction ID: {{ remote_id }}.{% endif %}</p>'
payment_deleted:
  category: commerce_payment
  label: 'Payment deleted'
  template: '<p>Платёж на сумму {{ amount|commerce_price_format }} удалён.{% if method %} [{{ method }}].{% endif %}{% if remote_id %}<br /> Transaction ID: {{ remote_id }}.{% endif %}</p>'
payment_failed:
  category: commerce_payment
  label: 'Payment failed'
  template: '<p>Неудачная попытка оплаты через <em>{{ gateway }}</em> на сумму {{ amount|commerce_price_format }}{% if method %} using <em>{{ method }}</em>{% endif %}.<br />Message: {{ error_message }}.{% if remote_id %}<br /> Transaction ID: {{ remote_id }}.{% endif %}</p>'
shipment_state_updated:
  category: commerce_order
  label: 'Shipment state updated'
  template: '<p>Статус <a href="{{ shipment_url }}">{{ shipment_label }}</a> изменён с <em>{{ from_state }}</em> на <em>{{ to_state }}</em> действием <em>{{ transition_label }}</em>.</p>'
