services:
  func_helper.phone_normalizer:
    class: Drupal\func_helper\Phone\PhoneNormalizer
    arguments: ['RU']

  func_helper.flood:
    class: Drupal\func_helper\Service\FloodHelper
    arguments: ['@flood', '@database', '@datetime.time']

  func_helper.secret:
    class: Drupal\func_helper\Service\SecretHelper
    arguments: ['@cache.data', '@datetime.time']

  bitrix_redirects.redirect_subscriber:
    class: Drupal\func_helper\EventSubscriber\BitrixRedirectSubscriber
    arguments: ['@path_alias.manager', '@current_route_match']
    tags:
      - { name: event_subscriber }
