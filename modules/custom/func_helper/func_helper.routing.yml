fnc_helper.home:
  path: '/home'
  defaults:
    _title: 'Home'
    _controller: '\Drupal\func_helper\Controller\HomePageController::content'
  requirements:
    _access: 'TRUE'

fnc_helper.page404:
  path: '/404'
  defaults:
    _controller: '\Drupal\func_helper\Controller\Page404Controller::content'
    _title: 'Страница не найдена'
  requirements:
    _access: 'TRUE'
