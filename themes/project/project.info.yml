name: Project
type: theme
description: 'Тема проекта на базе базовой темы Base9'
package: Core
version: 1.0.0
base theme: base9
core_version_requirement: ^11

libraries:
  - core/drupal.dialog.ajax
  - project/base
  - project/iconfont
  - base9/mobile-menu
  - base9/back-to-top
  - base9/click-to-copy
  - base9/swiper-thumbs
  - base9/tabs-js
  - base9/modal-ui-widget-remove
  - project/swiper-outsource-navigation

libraries-override:
  views_filters_summary/views_filters_summary:
    css:
      theme:
        css/views_filters_summary.css: false

regions:
  header: Header
  primary_menu: Primary menu
  secondary_menu: Secondary menu
  highlighted: Highlighted
  breadcrumb: Breadcrumb
  help: Help
  sidebar_first: Left sidebar
  content: Content
  sidebar_second: Right sidebar
  downlighted: Downlighted
  footer: Footer
